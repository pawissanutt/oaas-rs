apiVersion: apps/v1
kind: Deployment
metadata:
  name: oaas-crm-1-oprc-crm-gateway
  namespace: oaas-1
  labels:
    app: gateway
    platform: oaas
    helm.sh/chart: oprc-crm-0.1.0
