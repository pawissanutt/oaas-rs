spec:
  replicas: 1
  selector:
    matchLabels:
      app: gateway
      platform: oaas
      app.kubernetes.io/name: oprc-crm
      app.kubernetes.io/instance: oaas-crm-1
  template:
    metadata:
      labels:
        app: gateway
        platform: oaas
        app.kubernetes.io/name: oprc-crm
        app.kubernetes.io/instance: oaas-crm-1
        app.kubernetes.io/component: gateway
    spec:
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                labelSelector:
                  matchLabels:
                    app: gateway
                    platform: oaas
                topologyKey: "kubernetes.io/hostname"
      containers:
        - name: gateway
          image: "ghcr.io/pawissanutt/oaas-rs/gateway:latest"
          imagePullPolicy: Always
          env:
            - name: OPRC_LOG
              value: "info,otel::tracing=trace"
            - name: RUST_LOG
              value: "info,otel::tracing=trace"
            - name: OPRC_GW_HTTP_PORT
