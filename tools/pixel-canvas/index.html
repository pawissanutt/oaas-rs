<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Pixel Canvas — OaaS Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f9fafb; color: #111; min-height: 100vh; }

    header {
      background: #1e293b; color: #f8fafc; padding: 12px 20px;
      display: flex; align-items: center; gap: 12px;
    }
    header h1 { font-size: 18px; font-weight: 600; }
    header small { font-size: 12px; opacity: .6; }

    main { padding: 20px; display: flex; justify-content: center; }

    /* ---- Config form ---- */
    #config-form {
      background: #fff; border: 1px solid #e2e8f0; border-radius: 8px;
      padding: 28px; max-width: 480px; width: 100%;
    }
    #config-form h2 { font-size: 16px; margin-bottom: 16px; }
    .field { display: flex; flex-direction: column; gap: 4px; margin-bottom: 14px; }
    .field label { font-size: 13px; color: #374151; font-weight: 500; }
    .field input[type=text], .field input[type=number] {
      border: 1px solid #d1d5db; border-radius: 6px; padding: 7px 10px;
      font-size: 14px; width: 100%;
    }
    .field input:focus { outline: 2px solid #3b82f6; border-color: transparent; }
    .radio-group { display: flex; gap: 16px; }
    .radio-group label { display: flex; align-items: center; gap: 6px; font-size: 14px; cursor: pointer; }
    .radio-group input { margin-right: 4px; }
    .btn {
      background: #1e293b; color: #fff; border: none; border-radius: 6px;
      padding: 9px 20px; font-size: 14px; cursor: pointer; width: 100%; margin-top: 6px;
    }
    .btn:hover { background: #334155; }
    .hint { font-size: 12px; color: #6b7280; margin-top: 4px; }

    /* audience/presenter extra fields show/hide */
    #audience-fields, #presenter-fields { display: none; }
  </style>
</head>
<body>

<header>
  <div>
    <h1>Pixel Canvas</h1>
    <small>OaaS Distributed Demo</small>
  </div>
</header>

<main>
  <!-- Config form (shown when params are missing) -->
  <form id="config-form">
    <h2>Configure</h2>

    <div class="field">
      <label>Mode</label>
      <div class="radio-group">
        <label><input type="radio" name="mode" value="audience" checked> Audience (draw)</label>
        <label><input type="radio" name="mode" value="presenter"> Presenter (mosaic)</label>
      </div>
    </div>

    <div class="field">
      <label for="gateway">Gateway URL</label>
      <input type="text" id="gateway" placeholder="http://localhost:8080" value="">
      <span class="hint">Edge gateway for audience, cloud gateway for presenter.</span>
    </div>

    <!-- Audience-specific -->
    <div id="audience-fields">
      <div class="field">
        <label for="grid">Grid position (X-Y)</label>
        <input type="text" id="grid" placeholder="0-0" value="0-0">
        <span class="hint">Your tile position in the mosaic, e.g. 2-3</span>
      </div>
    </div>

    <!-- Presenter-specific -->
    <div id="presenter-fields">
      <div class="field" style="display:flex;flex-direction:row;gap:12px">
        <div style="flex:1">
          <label for="cols">Columns</label>
          <input type="number" id="cols" value="4" min="1" max="64">
        </div>
        <div style="flex:1">
          <label for="rows">Rows</label>
          <input type="number" id="rows" value="4" min="1" max="64">
        </div>
      </div>
    </div>

    <button class="btn" type="submit">Launch</button>
  </form>

  <!-- App mount point -->
  <div id="app"></div>
</main>

<script type="module">
  import { AudienceCanvas, PresenterMosaic } from "./canvas.js";

  // ---- helpers ----
  function param(name) {
    return new URLSearchParams(location.search).get(name) ?? "";
  }

  function launch(mode, gateway, gridStr, cols, rows) {
    document.getElementById("config-form").style.display = "none";
    const app = document.getElementById("app");
    app.style.display = "block";

    if (mode === "audience") {
      const [gx, gy] = (gridStr || "0-0").split("-").map(Number);
      new AudienceCanvas(app, gateway, gx, gy);
    } else if (mode === "presenter") {
      new PresenterMosaic(app, gateway, Number(cols) || 4, Number(rows) || 4);
    }
  }

  // ---- auto-launch from URL params ----
  const mode    = param("mode");
  const gateway = param("gateway");

  if (mode && gateway) {
    launch(mode, gateway, param("grid"), param("cols"), param("rows"));
  } else {
    // Show config form
    document.getElementById("config-form").style.display = "block";
    document.getElementById("app").style.display = "none";
  }

  // ---- config form toggle ----
  const form = document.getElementById("config-form");
  const audienceFields   = document.getElementById("audience-fields");
  const presenterFields  = document.getElementById("presenter-fields");

  function updateFieldVisibility() {
    const m = form.querySelector('input[name="mode"]:checked')?.value;
    audienceFields.style.display  = m === "audience"  ? "block" : "none";
    presenterFields.style.display = m === "presenter" ? "block" : "none";
  }
  form.querySelectorAll('input[name="mode"]').forEach(r =>
    r.addEventListener("change", updateFieldVisibility)
  );
  updateFieldVisibility();

  // Pre-fill form from existing params if partially set
  if (gateway) document.getElementById("gateway").value = gateway;
  if (param("grid"))  document.getElementById("grid").value  = param("grid");
  if (param("cols"))  document.getElementById("cols").value  = param("cols");
  if (param("rows"))  document.getElementById("rows").value  = param("rows");
  if (mode) {
    const r = form.querySelector(`input[name="mode"][value="${mode}"]`);
    if (r) { r.checked = true; updateFieldVisibility(); }
  }

  // ---- form submit → rebuild URL ----
  form.addEventListener("submit", (e) => {
    e.preventDefault();
    const m   = form.querySelector('input[name="mode"]:checked').value;
    const gw  = document.getElementById("gateway").value.trim();
    if (!gw) { alert("Gateway URL is required."); return; }

    const p = new URLSearchParams({ mode: m, gateway: gw });
    if (m === "audience") {
      p.set("grid", document.getElementById("grid").value.trim() || "0-0");
    } else {
      p.set("cols", document.getElementById("cols").value || "4");
      p.set("rows", document.getElementById("rows").value || "4");
    }
    location.search = p.toString();
  });
</script>
</body>
</html>
