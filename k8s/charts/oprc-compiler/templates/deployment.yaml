apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "oprc-compiler.fullname" . }}
  labels:
    {{- include "oprc-compiler.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "oprc-compiler.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "oprc-compiler.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            - name: PORT
              value: {{ .Values.service.targetPort | int | quote }}
            - name: HOST
              value: "0.0.0.0"
            - name: WIT_PATH
              value: /app/wit
            - name: SDK_PATH
              value: /app/sdk-src
            - name: MAX_SOURCE_SIZE
              value: {{ .Values.config.maxSourceSize | int | quote }}
            - name: COMPILE_TIMEOUT_MS
              value: {{ .Values.config.compileTimeoutMs | int | quote }}
            - name: LOG_LEVEL
              value: {{ .Values.config.logLevel | quote }}
            - name: NODE_OPTIONS
              value: "--max-old-space-size={{ .Values.config.maxOldSpaceSize }}"
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
